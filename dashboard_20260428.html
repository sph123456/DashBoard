          @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
          * { box-sizing:border-box;margin:0;padding:0 }
          body { font-family:'Inter',sans-serif;background:#0f172a;color:#e2e8f0;padding-bottom:60px }

          .hdr h1 { font-size:1.3rem;color:#fff }
          .sub { color:#94a3b8;font-size:.75rem;margin-top:2px }

          .kpi-card { background:#1e293b;border-radius:12px;padding:14px 10px;border:1px solid #334155;text-align:center;transition:transform .15s }

          .kpi-l { font-size:.72rem;color:#94a3b8;margin-top:4px }

          .filter-lbl { font-size:.7rem;color:#94a3b8;padding-left:2px }

          select:focus { border-color:#3b82f6 }
          select option { background:#1e293b }

          .toggle-btn:last-child { border-radius:0 8px 8px 0;border-left:none }
          .toggle-btn.active { background:#3b82f6;color:#fff;border-color:#3b82f6 }
          .toggle-btn:hover:not(.active) { background:#334155 }
          .content { max-width:1600px;margin:0 auto;padding:0 16px }
          .row { display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px }
          .card { background:#1e293b;border-radius:14px;padding:18px 14px;border:1px solid #334155 }
          .ct { font-size:.9rem;font-weight:600;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center }
          .ct-info { font-size:.7rem;color:#94a3b8;font-weight:400 }
          .ft { text-align:center;padding:24px;color:#94a3b8;font-size:.75rem }

          function updateTable(metric){const useMonth=viewMode==='month';let rows,cols;if(useMonth){const byM={};DCH.forEach(d=>{const k=d['月份']+'_'+d['渠道'];if(!byM[k]||d['实际消费']>byM[k].c)byM[k]=d;});rows=Object.values(byM).sort((a,b)=>b['月份'].localeCompare(a['月份'])).map(d=>({'月份':d['月份'],'渠道':d['渠道'],'实际消费':d['实际消费'],'线索数':d['线索数']}));cols=TBL_MONTH;}else{const seen={};filterD(DCCD).forEach(d=>{const k=d['日期']+'_'+d['城市']+'_'+d['渠道'];if(!seen[k]||d['实际消费']>seen[k]['实际消费'])seen[k]=d;});rows=Object.values(seen).filter(r=>r['日期']&&r['城市']&&r['渠道']).sort((a,b)=>b['日期'].localeCompare(a['日期'])).slice(0,200).map(d=>({'日期':d['日期'],'城市':d['城市'],'渠道':d['渠道'],'实际消费':d['实际消费'],'线索数':d['线索数'],'展现':d['展现']||0,'点击':d['点击']||0,'CTR':d['展现']?(d['点击']/d['展现()*100).toFixed(2)+'%':'-','CPC':d['点击']?'¥'+(d['实际消费']/d['点击']).toFixed(2):'-'}));cols=TBL_DAY;}$('lbl-table').textContent=rows.length+' 条';$('tbl-head').innerHTML='<tr>'+cols.map(c=>'<th>'+c.label+'</th>').join('')+'</tr>';$('tbl-body').innerHTML=rows.map(r=>'<tr>'+cols.map(c=>{const v=r[c.key];return'<td class="'+(c.num?'num':'')+'">'+(c.num?fmtNum(v):String(v))+'</td>'}).join('')+'</tr>').join('');}
          function updateChanTable(){const cutoffDt=cutoff(90);const recent=filterD(DCCD).filter(d=>d['日期']>=cutoffDt);const byCh={};recent.forEach(d=>{const ch=d['渠道']||'未知';if(!byCh[ch])byCh[ch]={渠道:ch,实际消费:0,线索数:0,展现:0,点击:0};byCh[ch].实际消费+=d['实际消费']||0;byCh[ch].线索数+=d['线索数']||0;byCh[ch].展现+=d['展现']||0;byCh[ch].点击+=d['点击']||0;});const rows=Object.values(byCh).map(d=>({渠道:d['渠道'],实际消费:d['实际消费'],线索数:d['线索数'],展现:d['展现'],点击:d['点击'],CTR:d['展现']?(d['点击']/d['展现']*100).toFixed(2)+'%':'-',CPC:d['点击']?'¥'+(d['实际消费']/d['点击']).toFixed(2):'-'})).sort((a,b)=>b['实际消费']-a['实际消费']);$('lbl-chan-tbl').textContent='近90天 · '+rows.length+' 个渠道';$('chan-tbl-head').innerHTML='<tr>'+TBL_CHAN.map(c=>'<th>'+c.label+'</th>').join('')+'</tr>';$('chan-tbl-body').innerHTML=rows.map(r=>'<tr>'+TBL_CHAN.map(c=>{const v=r[c.key];return'<td class="'+(c.num?'num':'')+'">'+(c.num?fmtNum(v):String(v))+'</td>'}).join('')+'</tr>').join('');}
          updateAll();
          </script></body></html>
